<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>VoIP + Chat + Contatos - Interface em Abas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .app-container {
            max-width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header com perfil e botões de navegação */
        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }

        .peer-info {
            background: #0f172a;
            border-radius: 50px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 150px;
        }

        .peer-info span {
            font-family: monospace;
            font-size: 0.7rem;
            color: #e2e8f0;
            word-break: break-all;
            flex: 1;
        }

        .peer-info button {
            background: #334155;
            border: none;
            padding: 4px 10px;
            border-radius: 40px;
            color: white;
            font-size: 0.65rem;
        }

        .nickname-area {
            background: #0f172a;
            border-radius: 50px;
            padding: 4px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nickname-area input {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.8rem;
            outline: none;
            width: 100px;
        }

        .nickname-area button {
            background: #3b82f6;
            border: none;
            padding: 4px 10px;
            border-radius: 40px;
            color: white;
            font-size: 0.65rem;
        }

        /* Botões redondos de navegação (3 abas) */
        .nav-buttons {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 8px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: #94a3b8;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn i {
            font-size: 1.6rem;
        }

        .nav-btn.active {
            background: #10b981;
            color: white;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }

        /* Conteúdo das abas */
        .tab-content {
            display: none;
            padding: 16px;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards internos */
        .card {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 3px solid #60a5fa;
            padding-left: 10px;
        }

        /* Chamada */
        .call-row {
            display: flex;
            gap: 10px;
            margin: 12px 0;
        }
        .call-row input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 60px;
            color: white;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .btn-call, .btn-hangup, .btn-mute {
            flex: 1;
            padding: 12px;
            border-radius: 60px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
        }
        .btn-call { background: #10b981; color: white; }
        .btn-hangup { background: #dc2626; color: white; }
        .btn-mute { background: #334155; color: white; }
        .btn-mute.active { background: #f59e0b; }
        .status-area {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            margin-top: 12px;
        }
        .timer { font-family: monospace; font-size: 1.1rem; color: #facc15; }

        /* Contatos */
        .contacts-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .contact-item {
            background: #0f172a;
            border-radius: 60px;
            padding: 10px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .contact-name { font-weight: 600; color: white; font-size: 0.9rem; }
        .contact-id { font-size: 0.65rem; font-family: monospace; color: #94a3b8; }
        .contact-actions { display: flex; gap: 8px; }
        .contact-actions button {
            background: #334155;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .contact-actions .call-contact { background: #10b981; }
        .contact-actions .chat-contact { background: #3b82f6; }
        .add-contact-form {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .add-contact-form input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 10px 14px;
            border-radius: 60px;
            color: white;
        }
        .add-contact-form button {
            background: #10b981;
            border: none;
            padding: 0 18px;
            border-radius: 60px;
            color: white;
        }

        /* Chat */
        .chat-messages {
            height: 40vh;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 24px;
            margin-bottom: 10px;
        }
        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .message.sent { align-self: flex-end; background: #10b981; color: white; }
        .message.received { align-self: flex-start; background: #334155; color: white; }
        .chat-input-area {
            display: flex;
            gap: 10px;
        }
        .chat-input-area input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 60px;
            color: white;
        }
        .chat-input-area button {
            background: #60a5fa;
            border: none;
            padding: 0 18px;
            border-radius: 60px;
            color: white;
        }
        .chat-remote-status {
            font-size: 0.7rem;
            text-align: center;
            margin: 8px 0;
            color: #94a3b8;
        }

        .mic-status {
            font-size: 0.7rem;
            margin-top: 8px;
            text-align: center;
        }

        .peer-status {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 6px;
            color: #94a3b8;
        }

        .request-mic-btn {
            background: #f59e0b;
            border: none;
            padding: 8px;
            border-radius: 40px;
            color: white;
            font-size: 0.75rem;
            width: 100%;
            margin-top: 8px;
        }

        .footer-note {
            font-size: 0.6rem;
            text-align: center;
            padding: 12px;
            color: #64748b;
        }
        #remoteAudio { display: none; }
        button { cursor: pointer; touch-action: manipulation; }
        input, textarea { font-size: 16px !important; }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Header com perfil e botões de navegação -->
    <div class="header">
        <div class="profile-row">
            <div class="peer-info">
                <i class="fas fa-id-card" style="color:#60a5fa;"></i>
                <span id="myImmutableId">Carregando...</span>
                <button id="copyIdBtn"><i class="fas fa-copy"></i> Copiar</button>
            </div>
            <div class="nickname-area">
                <input type="text" id="nicknameInput" placeholder="Nome">
                <button id="saveNicknameBtn">Salvar</button>
            </div>
        </div>
        <div id="peerConnectionStatus" class="peer-status">🟡 Conectando ao servidor...</div>
        <div id="micStatus" class="mic-status">🔴 Microfone: não permitido</div>
        <button id="requestMicBtn" class="request-mic-btn"><i class="fas fa-microphone"></i> Permitir Microfone</button>

        <!-- Botões redondos de navegação -->
        <div class="nav-buttons">
            <button class="nav-btn" data-tab="call">
                <i class="fas fa-phone-alt"></i>
                <span>Chamada</span>
            </button>
            <button class="nav-btn" data-tab="chat">
                <i class="fas fa-comment-dots"></i>
                <span>Chat</span>
            </button>
            <button class="nav-btn" data-tab="contacts">
                <i class="fas fa-address-book"></i>
                <span>Contatos</span>
            </button>
        </div>
    </div>

    <!-- Aba: Chamada VoIP -->
    <div id="tab-call" class="tab-content">
        <div class="card">
            <div class="card-title"><i class="fas fa-phone-alt"></i> Chamada de voz</div>
            <div class="call-row">
                <input type="text" id="remotePeerIdVoip" placeholder="ID imutável do contato">
            </div>
            <div class="action-buttons">
                <button id="callBtn" class="btn-call"><i class="fas fa-phone"></i> Chamar</button>
                <button id="hangupBtn" class="btn-hangup" disabled><i class="fas fa-phone-slash"></i> Desligar</button>
                <button id="muteBtn" class="btn-mute" disabled><i class="fas fa-microphone"></i> Silenciar</button>
            </div>
            <div class="status-area">
                <div style="display: flex; justify-content: space-between;">
                    <span id="connectionStatus">🔴 Desconectado</span>
                    <span id="callTimer" class="timer">00:00</span>
                </div>
                <div class="volume-control" style="margin-top: 8px;">
                    <i class="fas fa-volume-down"></i>
                    <input type="range" id="volumeSlider" min="0" max="100" value="80" style="flex:1">
                    <i class="fas fa-volume-up"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Aba: Chat -->
    <div id="tab-chat" class="tab-content">
        <div class="card">
            <div class="card-title"><i class="fas fa-comment-dots"></i> Bate-papo</div>
            <div class="chat-remote-status" id="chatRemoteStatus">🔴 Nenhum chat conectado</div>
            <div id="chatMessages" class="chat-messages">
                <div class="message received" style="opacity:0.7;">Conecte-se a um contato para conversar</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite uma mensagem...">
                <button id="sendMsgBtn"><i class="fas fa-paper-plane"></i> Enviar</button>
            </div>
            <div id="typingIndicator" style="font-size:0.7rem; color:#94a3b8; margin-top:6px;"></div>
            <div style="margin-top: 12px;">
                <input type="text" id="remotePeerIdChat" placeholder="ID do contato para conectar chat" style="width:100%; padding:10px; border-radius:60px; background:#0f172a; border:1px solid #334155; color:white; margin-bottom:8px;">
                <button id="connectChatBtn" style="width:100%; background:#3b82f6; border:none; padding:10px; border-radius:60px; color:white;">Conectar Chat</button>
                <button id="disconnectChatBtn" style="width:100%; margin-top:8px; background:#ef4444; border:none; padding:10px; border-radius:60px; color:white;">Desconectar</button>
            </div>
        </div>
    </div>

    <!-- Aba: Contatos -->
    <div id="tab-contacts" class="tab-content">
        <div class="card">
            <div class="card-title"><i class="fas fa-address-book"></i> Meus Contatos</div>
            <div id="contactsList" class="contacts-list"><div style="color:#94a3b8; text-align:center; padding:20px;">Carregando...</div></div>
            <div class="add-contact-form">
                <input type="text" id="newContactName" placeholder="Nome">
                <input type="text" id="newContactId" placeholder="ID imutável">
                <button id="addContactBtn"><i class="fas fa-plus"></i> Adicionar</button>
            </div>
        </div>
    </div>

    <div class="footer-note">ID imutável salvo localmente | Permissão de microfone necessária para chamadas</div>
</div>
<audio id="remoteAudio" autoplay></audio>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<script>
    (function() {
        // ---------- STORAGE ----------
        const STORAGE_IMMUTABLE_ID = 'voipapp_immutable_id';
        const STORAGE_NICKNAME = 'voipapp_nickname';
        const STORAGE_CONTACTS = 'voipapp_contacts';

        // ID IMUTÁVEL
        function getOrCreateImmutableId() {
            let stored = localStorage.getItem(STORAGE_IMMUTABLE_ID);
            if (stored && stored.trim()) return stored;
            let newId = (crypto.randomUUID?.()) || 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { let r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8); return v.toString(16); });
            localStorage.setItem(STORAGE_IMMUTABLE_ID, newId);
            return newId;
        }
        const immutableId = getOrCreateImmutableId();
        document.getElementById('myImmutableId').textContent = immutableId;

        // Nome mutável
        function getNickname() {
            let nick = localStorage.getItem(STORAGE_NICKNAME);
            if (!nick) nick = "Usuário_" + Math.floor(Math.random()*1000);
            localStorage.setItem(STORAGE_NICKNAME, nick);
            return nick;
        }
        function setNickname(newName) {
            if (newName?.trim()) localStorage.setItem(STORAGE_NICKNAME, newName.trim());
            return getNickname();
        }
        let currentNickname = getNickname();
        document.getElementById('nicknameInput').value = currentNickname;

        // Contatos
        let contacts = [];
        function loadContacts() {
            try { contacts = JSON.parse(localStorage.getItem(STORAGE_CONTACTS) || '[]'); } catch(e) { contacts = []; }
            renderContacts();
        }
        function saveContacts() { localStorage.setItem(STORAGE_CONTACTS, JSON.stringify(contacts)); }
        function addContact(name, id) {
            if (!name.trim() || !id.trim()) return false;
            if (contacts.some(c => c.id === id)) return false;
            contacts.push({ name: name.trim(), id: id.trim() });
            saveContacts();
            renderContacts();
            return true;
        }
        function deleteContact(idx) { contacts.splice(idx,1); saveContacts(); renderContacts(); }
        function updateContact(idx, name, id) {
            if (!name.trim() || !id.trim()) return false;
            contacts[idx] = { name: name.trim(), id: id.trim() };
            saveContacts();
            renderContacts();
            return true;
        }
        function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
        function renderContacts() {
            const container = document.getElementById('contactsList');
            if (!container) return;
            if (!contacts.length) { container.innerHTML = '<div style="color:#94a3b8; text-align:center; padding:20px;">Nenhum contato</div>'; return; }
            container.innerHTML = contacts.map((c, idx) => `
                <div class="contact-item">
                    <div class="contact-info">
                        <div class="contact-name">${escapeHtml(c.name)}</div>
                        <div class="contact-id">${escapeHtml(c.id.substring(0,12))}...</div>
                    </div>
                    <div class="contact-actions">
                        <button class="call-contact" data-idx="${idx}" title="Chamar"><i class="fas fa-phone"></i></button>
                        <button class="chat-contact" data-idx="${idx}" title="Conversar"><i class="fas fa-comment"></i></button>
                        <button class="edit-contact" data-idx="${idx}" title="Editar"><i class="fas fa-edit"></i></button>
                        <button class="delete-contact" data-idx="${idx}" title="Excluir"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.call-contact').forEach(btn => btn.onclick = () => { let c = contacts[btn.dataset.idx]; if(c) { document.getElementById('remotePeerIdVoip').value = c.id; switchTab('call'); makeCall(c.id); } });
            document.querySelectorAll('.chat-contact').forEach(btn => btn.onclick = () => { let c = contacts[btn.dataset.idx]; if(c) { switchTab('chat'); document.getElementById('remotePeerIdChat').value = c.id; connectChat(c.id); } });
            document.querySelectorAll('.edit-contact').forEach(btn => btn.onclick = () => { let c = contacts[btn.dataset.idx]; let n = prompt("Novo nome:", c.name); if(n?.trim()) updateContact(btn.dataset.idx, n, prompt("Novo ID:", c.id) || c.id); });
            document.querySelectorAll('.delete-contact').forEach(btn => btn.onclick = () => { if(confirm("Remover?")) deleteContact(btn.dataset.idx); });
        }

        // ---------- GERENCIAMENTO DE ABAS ----------
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if(btn.dataset.tab === tabId) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });
        switchTab('call'); // aba inicial

        // ---------- ELEMENTOS COMUNS ----------
        const remotePeerIdVoip = document.getElementById('remotePeerIdVoip');
        const callBtn = document.getElementById('callBtn');
        const hangupBtn = document.getElementById('hangupBtn');
        const muteBtn = document.getElementById('muteBtn');
        const connectionStatusSpan = document.getElementById('connectionStatus');
        const callTimerSpan = document.getElementById('callTimer');
        const volumeSlider = document.getElementById('volumeSlider');
        const remoteAudio = document.getElementById('remoteAudio');
        const copyIdBtn = document.getElementById('copyIdBtn');
        const requestMicBtn = document.getElementById('requestMicBtn');
        const micStatusSpan = document.getElementById('micStatus');
        const peerStatusSpan = document.getElementById('peerConnectionStatus');
        const chatMessagesDiv = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendMsgBtn = document.getElementById('sendMsgBtn');
        const chatRemoteStatusSpan = document.getElementById('chatRemoteStatus');
        const typingIndicatorDiv = document.getElementById('typingIndicator');
        const remotePeerIdChat = document.getElementById('remotePeerIdChat');
        const connectChatBtn = document.getElementById('connectChatBtn');
        const disconnectChatBtn = document.getElementById('disconnectChatBtn');
        const saveNicknameBtn = document.getElementById('saveNicknameBtn');
        const addContactBtn = document.getElementById('addContactBtn');
        const newContactName = document.getElementById('newContactName');
        const newContactId = document.getElementById('newContactId');

        // ---------- VARIÁVEIS GLOBAIS ----------
        let peer = null;
        let localStream = null;
        let currentCall = null;
        let isCallActive = false;
        let callStartTime = null;
        let timerInterval = null;
        let isMuted = false;
        let dataConnection = null;
        let currentChatPeerId = null;
        let typingTimeout = null;

        // ---------- PERMISSÃO MICROFONE ----------
        async function checkMicPermission() {
            if (!navigator.mediaDevices) { micStatusSpan.innerHTML = '⚠️ API não suportada'; return false; }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(t => t.stop());
                micStatusSpan.innerHTML = '✅ Microfone liberado';
                return true;
            } catch(err) {
                micStatusSpan.innerHTML = '🔴 Permissão negada. Clique no botão.';
                return false;
            }
        }
        async function requestMicrophonePermission() {
            micStatusSpan.innerHTML = '🟡 Solicitando...';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                localStream = stream;
                micStatusSpan.innerHTML = '✅ Microfone ativo';
                return true;
            } catch(err) {
                micStatusSpan.innerHTML = '❌ Permissão negada. Verifique as configurações do site.';
                return false;
            }
        }
        requestMicBtn.onclick = requestMicrophonePermission;
        checkMicPermission();

        async function getMicrophoneStream() {
            if (localStream && localStream.active && localStream.getAudioTracks().length) return localStream;
            const granted = await requestMicrophonePermission();
            if (!granted) throw new Error("Microfone não disponível");
            return localStream;
        }

        // ---------- FUNÇÕES VOIP ----------
        function updateStatusUI(text, connected) { connectionStatusSpan.innerHTML = connected ? `🟢 ${text}` : `🔴 ${text}`; }
        function formatTime(s) { return `${Math.floor(s/60)}`.padStart(2,'0')+':'+`${s%60}`.padStart(2,'0'); }
        function startTimer() { if(timerInterval) clearInterval(timerInterval); callStartTime = Date.now(); timerInterval = setInterval(() => { if(isCallActive && callStartTime) callTimerSpan.textContent = formatTime(Math.floor((Date.now()-callStartTime)/1000)); else callTimerSpan.textContent = '00:00'; }, 1000); }
        function stopTimer() { if(timerInterval) clearInterval(timerInterval); callTimerSpan.textContent = '00:00'; callStartTime = null; }
        
        function setCallUICleanup() {
            isCallActive = false;
            callBtn.disabled = false;
            hangupBtn.disabled = true;
            muteBtn.disabled = true;
            muteBtn.classList.remove('active');
            muteBtn.innerHTML = '<i class="fas fa-microphone"></i> Silenciar';
            if(localStream) localStream.getAudioTracks().forEach(t => { if(!t.enabled) t.enabled = true; });
            updateStatusUI('Sem chamada ativa', false);
            stopTimer();
        }
        
        async function endCall() {
            if(currentCall) { currentCall.close(); currentCall = null; }
            if(remoteAudio.srcObject) { remoteAudio.srcObject.getTracks().forEach(t=>t.stop()); remoteAudio.srcObject = null; }
            setCallUICleanup();
        }

        function setupCallEvents(call) {
            call.on('stream', (remoteStream) => {
                remoteAudio.srcObject = remoteStream;
                remoteAudio.volume = volumeSlider.value/100;
                updateStatusUI('Em chamada', true);
                isCallActive = true;
                startTimer();
            });
            call.on('close', () => endCall());
            call.on('error', () => { endCall(); alert("Erro na chamada"); });
        }

        async function makeCall(remoteId) {
            if(!remoteId) { alert("Digite o ID do contato."); return; }
            if(currentCall) { alert("Já em chamada."); return; }
            if(!peer || peer.disconnected) { alert("Peer desconectado. Recarregue a página."); return; }
            try {
                let stream = await getMicrophoneStream();
                if (!stream) throw new Error("Sem microfone");
                const call = peer.call(remoteId.trim(), stream);
                currentCall = call;
                setupCallEvents(call);
                callBtn.disabled = true; hangupBtn.disabled = false; muteBtn.disabled = false;
                updateStatusUI(`Chamando...`, false);
                setTimeout(() => { if(currentCall === call && !isCallActive) endCall(); }, 20000);
            } catch(e) { alert(e.message); setCallUICleanup(); }
        }

        function toggleMute() {
            if(!localStream || !isCallActive) return;
            const track = localStream.getAudioTracks()[0];
            if(track) {
                track.enabled = !track.enabled;
                isMuted = !track.enabled;
                if(isMuted) { muteBtn.classList.add('active'); muteBtn.innerHTML = '<i class="fas fa-microphone-slash"></i> Mutado'; }
                else { muteBtn.classList.remove('active'); muteBtn.innerHTML = '<i class="fas fa-microphone"></i> Silenciar'; }
            }
        }

        // ---------- CHAT ----------
        function addChatMessage(text, type, sender = '') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            let display = type === 'sent' ? `${currentNickname} (você)` : (sender || 'Contato');
            msgDiv.innerHTML = `<div>${escapeHtml(text)}</div><div style="font-size:0.65rem; opacity:0.7;">${display} • ${new Date().toLocaleTimeString()}</div>`;
            chatMessagesDiv.appendChild(msgDiv);
            msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        function updateChatStatus(connected, peerId='') {
            chatRemoteStatusSpan.innerHTML = connected ? `🟢 Conectado a ${peerId.substring(0,8)}...` : `🔴 Nenhum chat conectado`;
        }

        function sendChatMessage() {
            const text = chatInput.value.trim();
            if(!text) return;
            if(!dataConnection?.open) { alert("Conecte-se a um contato primeiro."); return; }
            dataConnection.send({ type: 'chat', message: text, senderName: currentNickname });
            addChatMessage(text, 'sent');
            chatInput.value = '';
        }

        function closeDataConnection() {
            if(dataConnection) { dataConnection.close(); dataConnection = null; }
            currentChatPeerId = null;
            updateChatStatus(false);
        }

        function setupDataEvents(conn, remoteId) {
            conn.on('open', () => {
                currentChatPeerId = remoteId;
                updateChatStatus(true, remoteId);
                addChatMessage(`💬 Conectado com ${remoteId.substring(0,8)}...`, 'received', 'Sistema');
                conn.send({ type: 'system', info: `nickname:${currentNickname}` });
            });
            conn.on('data', (data) => {
                if(data?.type === 'chat') addChatMessage(data.message, 'received', data.senderName || remoteId);
                else if(data?.type === 'typing') { typingIndicatorDiv.textContent = 'Digitando...'; clearTimeout(typingTimeout); typingTimeout = setTimeout(() => typingIndicatorDiv.textContent = '', 2000); }
                else if(data?.type === 'system' && data.info?.startsWith('nickname:')) addChatMessage(`📛 Apelido: ${data.info.split(':')[1]}`, 'received', 'Sistema');
            });
            conn.on('close', () => { updateChatStatus(false); addChatMessage(`🔌 Chat encerrado`, 'received', 'Sistema'); if(dataConnection === conn) { dataConnection = null; currentChatPeerId = null; } });
            conn.on('error', () => addChatMessage(`Erro no chat`, 'received', 'Sistema'));
        }

        function connectChat(remoteId) {
            if(!remoteId) { alert("Informe o ID."); return; }
            if(dataConnection?.open) { if(currentChatPeerId === remoteId) alert("Já conectado."); else closeDataConnection(); }
            if(!peer || peer.disconnected) { alert("Peer offline."); return; }
            const conn = peer.connect(remoteId.trim(), { reliable: true });
            dataConnection = conn;
            setupDataEvents(conn, remoteId);
            addChatMessage(`🔄 Conectando...`, 'received', 'Sistema');
            setTimeout(() => { if(dataConnection === conn && !conn.open) { addChatMessage(`❌ Falha ao conectar.`, 'received', 'Sistema'); updateChatStatus(false); } }, 8000);
        }

        function onIncomingData(conn) {
            if(dataConnection?.open) { conn.close(); addChatMessage(`❗ Conexão recusada (já ocupado).`, 'received', 'Sistema'); return; }
            dataConnection = conn;
            setupDataEvents(conn, conn.peer);
            addChatMessage(`📞 Solicitação de chat de ${conn.peer.substring(0,8)}...`, 'received', 'Sistema');
        }

        function sendTyping() { if(dataConnection?.open) dataConnection.send({ type: 'typing' }); }

        // ---------- PEER ----------
        function initPeer() {
            if(peer && !peer.destroyed) peer.destroy();
            const options = { host: '0.peerjs.com', port: 443, path: '/', secure: true, debug: 0 };
            peer = new Peer(immutableId, options);
            peer.on('open', (id) => {
                document.getElementById('myImmutableId').textContent = id;
                peerStatusSpan.innerHTML = '✅ Conectado ao servidor';
                updateStatusUI("Conectado", true);
            });
            peer.on('call', async (incoming) => {
                if(currentCall) { incoming.close(); return; }
                try {
                    let stream = await getMicrophoneStream();
                    if (!stream) throw new Error("Sem microfone");
                    incoming.answer(stream);
                    currentCall = incoming;
                    setupCallEvents(currentCall);
                    callBtn.disabled = true; hangupBtn.disabled = false; muteBtn.disabled = false;
                    updateStatusUI(`Atendendo...`, false);
                    if(navigator.vibrate) navigator.vibrate(200);
                } catch(e) { incoming.close(); alert("Não foi possível atender: microfone indisponível."); }
            });
            peer.on('connection', onIncomingData);
            peer.on('error', (err) => { console.error(err); peerStatusSpan.innerHTML = '⚠️ Erro no peer'; updateStatusUI("Erro", false); });
            peer.on('disconnected', () => { peerStatusSpan.innerHTML = '🟡 Desconectado'; updateStatusUI("Desconectado", false); });
            peer.on('close', () => { if(currentCall) endCall(); });
        }

        // ---------- EVENTOS UI ----------
        callBtn.onclick = () => makeCall(remotePeerIdVoip.value.trim());
        hangupBtn.onclick = endCall;
        muteBtn.onclick = () => { if(isCallActive) toggleMute(); };
        volumeSlider.oninput = (e) => { remoteAudio.volume = e.target.value/100; };
        copyIdBtn.onclick = () => { navigator.clipboard.writeText(immutableId); copyIdBtn.innerHTML = '<i class="fas fa-check"></i>'; setTimeout(() => copyIdBtn.innerHTML = '<i class="fas fa-copy"></i>', 1500); };
        saveNicknameBtn.onclick = () => { let newName = document.getElementById('nicknameInput').value.trim(); if(newName) { currentNickname = setNickname(newName); if(dataConnection?.open) dataConnection.send({ type: 'system', info: `nickname:${currentNickname}` }); } };
        addContactBtn.onclick = () => { let name = newContactName.value.trim(); let id = newContactId.value.trim(); if(addContact(name, id)) { newContactName.value = ''; newContactId.value = ''; alert("Contato adicionado!"); } else alert("Preencha ambos ou contato duplicado."); };
        sendMsgBtn.onclick = sendChatMessage;
        chatInput.onkeypress = (e) => { if(e.key === 'Enter') sendChatMessage(); else sendTyping(); };
        connectChatBtn.onclick = () => connectChat(remotePeerIdChat.value.trim());
        disconnectChatBtn.onclick = () => { closeDataConnection(); addChatMessage("Você desconectou o chat.", 'received', 'Sistema'); };

        // Inicialização
        loadContacts();
        initPeer();
        setCallUICleanup();
        window.addEventListener('beforeunload', () => { if(localStream) localStream.getTracks().forEach(t=>t.stop()); if(currentCall) currentCall.close(); if(dataConnection) dataConnection.close(); if(peer && !peer.destroyed) peer.destroy(); });
    })();
</script>
</body>
</html>
